{%extends 'tarefas/base.html'%}
{% block body %}
<div class="progress-container">
    <label>Progresso</label>
    <div class="progress-bar">
        <div class="progress" style=></div>
    </div>
    <div class="progress-count">0/0</div>
</div>

<form class="task-form" method="POST">
    <input name="label" type="text" placeholder="$ adicionar nova tarefa..." required autofocus />
    <button type="submit">ADD</button>
</form>

<ul class="task-list">
    <li class="completed">
        <form method="POST">
            <input type="checkbox" onChange="this.form.submit()" checked />
        </form>
        <span>Assistir 30 minutos de aulas</span>
        <a href="" class="delete">×</a>
    </li>
    
</ul>
<p class="footer">faltam 4 tarefas • Bora codar!</p>
{% endblock %}
